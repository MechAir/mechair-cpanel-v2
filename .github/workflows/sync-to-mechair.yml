name: Sync to MechAir GitHub
on:
  push:
    branches: [main]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Push to MechAir repo
        run: |
          git remote set-url origin https://MechAir:${{ secrets.MECHAIR_PAT }}@github.com/MechAir/mechair-cpanel-v2.git
          git push origin main --force
