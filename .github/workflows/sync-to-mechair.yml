name: Sync to MechAir GitHub
on:
  push:
    branches: [main]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to MechAir repo
        env:
          PAT: ${{ secrets.MECHAIR_PAT }}
        run: |
          git config user.name "DhyeyBhavsar"
          git config user.email "dhyey@mechair.co.in"
          git remote add mechair https://${PAT}@github.com/MechAir/mechair-cpanel-v2.git
          git push mechair main --force
